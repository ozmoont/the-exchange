name: ci

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel any in-progress run for the same PR/branch when a new commit lands.
# Saves CI minutes when someone force-pushes mid-build.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: TypeScript
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck

  test:
    name: Vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm test:run
        env:
          # vitest expects these to exist even though our unit tests don't
          # actually open a connection — the lazy db client only throws when
          # a real query runs, and our tests mock the db client where needed.
          # Set placeholders so any module-load env reads succeed.
          DATABASE_URL: postgres://placeholder@localhost:5432/placeholder
          PARTNER_CREDENTIAL_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
          AUTH_SECRET: ci-placeholder-not-used-by-unit-tests
